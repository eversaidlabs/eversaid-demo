# =============================================================================
# Production Environment - Self-contained
# =============================================================================
#
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# This is a complete, self-contained configuration for production.
#
# Ports: 3000 (frontend), 8001 (backend)
# Images: ghcr.io/eversaidlabs/eversaid-*:latest (or version tag)
# =============================================================================

services:
  frontend:
    image: ghcr.io/eversaidlabs/eversaid-frontend:${IMAGE_TAG:-latest}
    container_name: eversaid-frontend-prod
    ports:
      - "3000:3000"
    environment:
      # Runtime config read by Server Components (not baked in at build time)
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Demo content attribution
      DEMO_SL_DISPLAY_NAME: ${DEMO_SL_DISPLAY_NAME:-}
      DEMO_SL_SOURCE_URL: ${DEMO_SL_SOURCE_URL:-}
      DEMO_EN_DISPLAY_NAME: ${DEMO_EN_DISPLAY_NAME:-}
      DEMO_EN_SOURCE_URL: ${DEMO_EN_SOURCE_URL:-}
      # Feature flags
      ENABLE_MODEL_SELECTION: ${ENABLE_MODEL_SELECTION:-false}
      ENABLE_TEMPERATURE_SELECTION: ${ENABLE_TEMPERATURE_SELECTION:-false}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/eversaidlabs/eversaid-backend:${IMAGE_TAG:-latest}
    container_name: eversaid-backend-prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    labels:
      logging: "loki"
    environment:
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Core API
      CORE_API_URL: ${CORE_API_URL:-http://host.docker.internal:8000}
      SESSION_DURATION_DAYS: ${SESSION_DURATION_DAYS:-7}
      # Transcribe rate limits
      RATE_LIMIT_DAY: ${RATE_LIMIT_DAY:-20}
      RATE_LIMIT_IP_DAY: ${RATE_LIMIT_IP_DAY:-20}
      RATE_LIMIT_GLOBAL_DAY: ${RATE_LIMIT_GLOBAL_DAY:-1000}
      # LLM/Analysis rate limits (10x transcribe)
      RATE_LIMIT_LLM_DAY: ${RATE_LIMIT_LLM_DAY:-200}
      RATE_LIMIT_LLM_IP_DAY: ${RATE_LIMIT_LLM_IP_DAY:-200}
      RATE_LIMIT_LLM_GLOBAL_DAY: ${RATE_LIMIT_LLM_GLOBAL_DAY:-10000}
      # Audio validation limits
      MAX_AUDIO_FILE_SIZE_MB: ${MAX_AUDIO_FILE_SIZE_MB:-50}
      MAX_AUDIO_DURATION_SECONDS: ${MAX_AUDIO_DURATION_SECONDS:-180}
      # Auth rate limiting
      RATE_LIMIT_AUTH_IP_15MIN: ${RATE_LIMIT_AUTH_IP_15MIN:-10}
      # Database configuration (PostgreSQL)
      DATABASE_HOST: ${DATABASE_HOST:-host.docker.internal}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-eversaid}
      DATABASE_USER: ${DATABASE_USER:-eversaid}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA:-platform_prod}
      # CORS - allow production domains
      CORS_ORIGINS: ${CORS_ORIGINS:-https://eversaid.ai,https://www.eversaid.ai,https://app.eversaid.ai}
      # Cookie domain for cross-subdomain auth
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.eversaid.ai}
      # Analytics (PostHog) - served via /api/config
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-/ingest}
      # Email notifications (Brevo)
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL:-}
      # Cloudflare Turnstile (bot protection)
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      # JWT authentication
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
      # API key settings (for Core API integration)
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      API_KEY_DEFAULT_RATE_LIMIT_RPM: ${API_KEY_DEFAULT_RATE_LIMIT_RPM:-60}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health && curl -f $$CORE_API_URL/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  default:
    name: eversaid-prod-network
